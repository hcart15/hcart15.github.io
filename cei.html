<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEI - TRV Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a> |
        <a href="risk.html">Risk Assessment</a> |
        <a href="cei.html">CEI</a> |
        <a href="employment.html">Employment</a> |
        <a href="ml.html">ML Insights</a>
    </nav>

    <div class="content">
        <h1>Community Economic Index (CEI)</h1>
        <p>Here you can view the CEI scores for various communities.</p>

        <label for="community">Select a Community:</label>
        <select id="community" onchange="showCEI()">
            <option value="">Select...</option>
            <option value="community1">Community 1</option>
            <option value="community2">Community 2</option>
        </select>

        <p id="ceiResult"></p>
    </div>

    <script>
        function showCEI() {
            const community = document.getElementById("community").value;
            const result = document.getElementById("ceiResult");

            if (community === "community1") {
                result.innerText = "Community 1 CEI: 75 (Above Average)";
            } else if (community === "community2") {
                result.innerText = "Community 2 CEI: 60 (Average)";
            } else {
                result.innerText = "";
            }
        }
    </script>
</body>
</html>
