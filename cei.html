{% extends "base.html" %}
{% block content %}
<h2>CEI Data</h2>

    {{ table_data|safe }}

{% block scripts %}

          "autoWidth": true,
          "scrollX": true   // Enable horizontal scrolling
      });
  });
</script>
{% endblock %}
