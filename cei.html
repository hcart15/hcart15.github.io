{% extends "base.html" %}

{% block title %}Community Economic Index (CEI){% endblock %}

{% block content %}
<h1>Community Economic Index (CEI)</h1>

<canvas id="ceiChart" width="400" height="200"></canvas>

<script>
    const ctx = document.getElementById('ceiChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Community 1', 'Community 2', 'Community 3'],
            datasets: [{
                label: 'CEI Score',
                data: [75, 60, 85],
                backgroundColor: ['#4caf50', '#ff9800', '#2196f3']
            }]
        },
        options: { responsive: true }
    });
</script>
{% endblock %}
