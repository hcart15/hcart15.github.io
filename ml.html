<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Insights - TRV Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> |
        <a href="risk.html">Risk Assessment</a> |
        <a href="cei.html">CEI</a> |
        <a href="employment.html">Employment</a> |
        <a href="ml.html">ML Insights</a>
    </nav>

    <div class="content">
        <h1>Machine Learning Insights</h1>
        <p>View risk predictions based on ML models.</p>

        <canvas id="mlChart" width="400" height="200"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('mlChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Community 1', 'Community 2', 'Community 3'],
                datasets: [{
                    label: 'Predicted Risk Level',
                    data: [80, 60, 40],
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56']
                }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
