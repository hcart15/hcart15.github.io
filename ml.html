<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Insights</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="/">Home</a> |
        <a href="/risk">Risk Assessment</a> |
        <a href="/cei">CEI</a> |
        <a href="/employment">Employment</a> |
        <a href="/ml">ML Insights</a>
    </nav>

    <h1>Machine Learning Insights</h1>

    <canvas id="mlChart" width="400" height="200"></canvas>

    <script>
        const ctx = document.getElementById('mlChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Community 1', 'Community 2', 'Community 3'],
                datasets: [{
                    label: 'Predicted Risk Level',
                    data: [80, 65, 90],
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56']
                }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
