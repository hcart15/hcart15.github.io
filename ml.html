{% extends "base.html" %}

{% block title %}ML Insights{% endblock %}

{% block content %}
<h1>Machine Learning Insights</h1>

<canvas id="mlChart" width="400" height="200"></canvas>

<script>
    const ctx = document.getElementById('mlChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Community 1', 'Community 2', 'Community 3'],
            datasets: [{
                label: 'Predicted Risk Level',
                data: [80, 65, 90],
                backgroundColor: ['#ff6384', '#36a2eb', '#ffce56']
            }]
        },
        options: { responsive: true }
    });
</script>
{% endblock %}
