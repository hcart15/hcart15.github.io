{% extends "base.html" %}

{% block title %}Employment Data{% endblock %}

{% block content %}
<h1>Employment Data</h1>

<canvas id="employmentChart" width="400" height="200"></canvas>

<script>
    const ctx = document.getElementById('employmentChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Community 1', 'Community 2', 'Community 3'],
            datasets: [{
                label: 'Employment Rate (%)',
                data: [85, 72, 90],
                borderColor: '#4caf50',
                fill: false
            }]
        },
        options: { responsive: true }
    });
</script>
{% endblock %}
