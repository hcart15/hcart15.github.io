{% extends "base.html" %}
{% block content %}
<h2>Risk Assessment</h2>

<!-- Risk Assessment Form -->
<form method="POST" action="{{ url_for('risk') }}">
    <div class="form-group">
        <label for="property_type">Property Type:</label>
        <select class="form-control" name="property_type" id="property_type" required>
            {% for p in property_types %}
                <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="community">Community:</label>
        <select class="form-control" name="community" id="community" required>
            {% for c in communities %}
                <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Calculate Risk</button>
</form>

<!-- Display Risk Results -->
{% if risk_score %}
    <div class="mt-4">
        <h4>Risk Score: {{ risk_score }}</h4>
        <p>Consequence Level: {{ consequence }}</p>
        {% if plot_url %}
            <img src="{{ plot_url }}" class="img-fluid" alt="Risk Plot">
        {% endif %}
    </div>
{% endif %}
{% endblock %}
